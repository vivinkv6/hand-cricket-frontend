name: Publish GHCR Image

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

concurrency:
  group: ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image name
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="$(basename "${GITHUB_REPOSITORY}")"
          echo "IMAGE_NAME=${REGISTRY}/${owner}/${repo}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.run_number }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SERVER_URL=https://api-hc.vivinkv.me
          cache-from: type=gha
          cache-to: type=gha,mode=max


      - name: Trigger Coolify deployment
        env:
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "$COOLIFY_WEBHOOK" ] || [ -z "$COOLIFY_TOKEN" ]; then
            echo "Coolify webhook/token not configured; skipping deploy trigger."
            exit 0
          fi

          webhook="$(printf '%s' "$COOLIFY_WEBHOOK" | tr -d '\r\n')"
          token="$(printf '%s' "$COOLIFY_TOKEN" | tr -d '\r\n')"

          echo "Triggering Coolify deployment..."
          curl --fail --show-error --silent --request GET "$webhook" \
            --header "Authorization: Bearer $token"

          echo "Coolify deploy triggered"